name: Build Linux Executable for RHEL 7

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 改用 Rocky Linux 8 (有更新的 GCC)
    container:
      image: rockylinux:8

    steps:
    # 1. 检出代码 (Rocky Linux 8 的仓库是活跃的，无需修复)
    - name: 检出代码
      uses: actions/checkout@v4

    # 2. 安装系统依赖和开发工具
    - name: 安装系统依赖和开发工具
      run: |
        dnf groupinstall -y "Development Tools"
        dnf install -y git openssl-devel zlib-devel bzip2-devel libffi-devel sqlite-devel readline-devel tk-devel gdbm-devel ncurses-devel xz-devel libX11 libXext libXrender libGL
        dnf clean all

    # 3. 使用官方 setup-python 安装 Python 3.12
    - name: 设置 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    # 4. 验证 Python 版本
    - name: 验证 Python 版本
      run: |
        python --version
        gcc --version

    # 5. 安装 Python 依赖
    - name: 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir \
          PySide6==6.6.3.1 \
          pyais \
          attrs \
          packaging \
          altgraph \
          pyinstaller

    # 6. 使用 PyInstaller 打包
    - name: 使用 PyInstaller 打包
      run: |
        pyinstaller --onefile \
          --name="main" \
          --clean \
          --noconfirm \
          --hidden-import=PySide6.QtCore \
          --hidden-import=PySide6.QtGui \
          --hidden-import=PySide6.QtWidgets \
          --hidden-import=pyais.encode \
          --add-data="/opt/hostedtoolcache/Python/3.12.3/x64/lib/python3.12/site-packages/PySide6/Qt/plugins:/plugins" \
          main.py

    # 7. 显示文件信息
    - name: 显示可执行文件信息
      run: |
        ls -lh dist/main
        file dist/main
        ldd dist/main | head -20

    # 8. 上传构建产物
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: main-executable-rhel7
        path: dist/main
        retention-days: 30
